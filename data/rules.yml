version: "3.1"

rules:
  - rule: greet
    steps:
      - intent: greet
      - action: utter_greet

  - rule: goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Say 'I am a bot' anytime the user challenges
    steps:
    - intent: bot_challenge
    - action: utter_iamabot

  - rule: ask employee attribute
    steps:
      - intent: ask_employee_attribute
      - action: action_get_employee_attribute

  - rule: ask employee by name
    steps:
      - intent: ask_employee_by_name
      - action: action_get_employee_by_name

  - rule: ask employee by email
    steps:
      - intent: ask_employee_by_email
      - action: action_get_employee_by_email

  - rule: ask employee by code
    steps:
      - intent: ask_employee_by_code
      - action: action_get_employee_by_code

  - rule: list employees
    steps:
      - intent: list_employees
      - action: action_list_employees

  - rule: ask employee manager
    steps:
      - intent: ask_employee_manager
      - action: action_get_employee_manager

  # my employee rules
  - rule: Get my employee details
    steps:
      - intent: ask_my_employee_details
      - action: action_get_my_employee_details

  - rule: Get my employee attribute
    steps:
      - intent: ask_my_employee_attribute
      - action: action_get_my_employee_attribute

